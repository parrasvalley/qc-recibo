<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Recibo - Parras Valley</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#080c10;color:#f0ece6;font-family:system-ui,sans-serif;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var RANCHOS=["PVT","CRP","Forrajera"];
var PRODUCTOS=["Persa","Slicer","Europeo","Morron","Minibel"];
var DEFECTOS={
  "Persa":["Deforme","Cicatriz","Dano mecan.","Trips","Dano corte","Amarillo","Mal cierre","Podrido","Punta floja","Gusano","Fruta pasada","Fruta tierna","Flacido"],
  "Slicer":["Deforme","Cicatriz","D.mecanicos","Trips","Flacidez","L.Menor 7","Punt.blandas","Diam.menor"],
  "Europeo":["Deforme","Cicatriz","Dano mecan.","Trips","Amarillo","Mal cierre","Gusano","D.Menor 1.5","D.Mayor 2","L.Menor 11","L.Mayor 14","Flacido"],
  "Morron":["Deforme","Cicatriz","Dano mecan.","Trips","Amarillo","Podrido","Mancha","Mal cierre"],
  "Minibel":["Deforme","Cicatriz","Dano mecan.","Trips","Amarillo","Podrido","Mancha"]
};
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsLoad(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function nv(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function f1(v){return isNaN(v)||!isFinite(v)?"0.0":Number(v).toFixed(1);}
function pct(n,t){return t>0?Math.round((n/t)*100):0;}
function sem(p){
  if(p<70)return{c:"#ef4444",lbl:"ALERTA"};
  if(p<80)return{c:"#f59e0b",lbl:"CUIDADO"};
  return{c:"#22c55e",lbl:"BIEN"};
}
function initForm(prod){
  var defs={};
  (DEFECTOS[prod]||[]).forEach(function(d){defs[d]="";});
  return{rancho:"PVT",malla:"",producto:prod,peso:"",piezas:"",primera:"",segunda:"",tercera:"",merma:"",defs:defs};
}
function App(){
  var s1=useState(function(){return lsLoad("qcr5-m",[]);});
  var muestras=s1[0];var setMuestras=s1[1];
  var s2=useState(function(){return lsLoad("qcr5-h",[]);});
  var hist=s2[0];var setHist=s2[1];
  var s3=useState("captura");
  var tab=s3[0];var setTab=s3[1];
  var s4=useState(function(){return initForm("Persa");});
  var form=s4[0];var setForm=s4[1];

  function saveMuestras(v){setMuestras(v);lsSave("qcr5-m",v);}
  function saveHist(v){setHist(v);lsSave("qcr5-h",v);}
  function set(k,v){setForm(function(f){var r=Object.assign({},f);r[k]=v;return r;});}
  function setD(k,v){setForm(function(f){var d=Object.assign({},f.defs);d[k]=v;return Object.assign({},f,{defs:d});});}
  function cambioProd(prod){
    var defs={};(DEFECTOS[prod]||[]).forEach(function(d){defs[d]="";});
    setForm(function(f){return Object.assign({},f,{producto:prod,defs:defs});});
  }

  var total=nv(form.primera)+nv(form.segunda)+nv(form.tercera)+nv(form.merma);
  var pPri=pct(nv(form.primera),total);
  var pSeg=pct(nv(form.segunda),total);
  var pTer=pct(nv(form.tercera),total);
  var pMer=pct(nv(form.merma),total);
  var smNow=sem(pPri);
  var piezasDefecto=nv(form.segunda)+nv(form.tercera)+nv(form.merma);
  var totalDefs=Object.values(form.defs).reduce(function(s,v){return s+nv(v);},0);
  var alertaInc=total>0&&totalDefs>piezasDefecto;
  var totalPiezas=nv(form.piezas);
  var alertaCuadre=totalPiezas>0&&total>0&&total!==totalPiezas;
  var puedoGuardar=!!(form.malla&&total>0&&!alertaInc&&!alertaCuadre);

  function guardar(){
    if(!puedoGuardar)return;
    var m={id:Date.now(),rancho:form.rancho,malla:form.malla,producto:form.producto,
      peso:nv(form.peso),piezas:nv(form.piezas),total:total,pPri:pPri,pSeg:pSeg,pTer:pTer,pMer:pMer,
      defs:Object.assign({},form.defs)};
    saveMuestras(muestras.concat([m]));
    setForm(initForm(form.producto));
  }

  function calcRes(){
    var g={};
    muestras.forEach(function(m){
      var k=m.rancho+"|"+m.producto;
      if(!g[k])g[k]={rancho:m.rancho,producto:m.producto,list:[]};
      g[k].list.push(m);
    });
    return Object.values(g).map(function(gr){
      var n=gr.list.length;
      var avgPri=gr.list.reduce(function(s,m){return s+m.pPri;},0)/n;
      var avgMer=gr.list.reduce(function(s,m){return s+m.pMer;},0)/n;
      var avgPeso=gr.list.reduce(function(s,m){return s+m.peso;},0)/n;
      var dAcum={};
      gr.list.forEach(function(m){Object.entries(m.defs||{}).forEach(function(kv){dAcum[kv[0]]=(dAcum[kv[0]]||0)+nv(kv[1]);});});
      var totPz=gr.list.reduce(function(s,m){return s+m.total;},0);
      var topDefs=Object.entries(dAcum).map(function(kv){return{d:kv[0],p:pct(kv[1],totPz)};}).filter(function(x){return x.p>0;}).sort(function(a,b){return b.p-a.p;}).slice(0,3);
      return Object.assign({},gr,{n:n,avgPri:avgPri,avgMer:avgMer,avgPeso:avgPeso,topDefs:topDefs});
    });
  }

  var inp={width:"100%",border:"1px solid #1e2530",borderRadius:5,padding:"6px 8px",background:"#0d1117",color:"#f0ece6",fontFamily:"monospace",fontSize:13,fontWeight:700,outline:"none"};
  var btn={width:"100%",padding:"10px",border:"none",borderRadius:7,fontFamily:"monospace",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:5};
  var lbl={fontSize:8,color:"#4a5568",textTransform:"uppercase",letterSpacing:1,marginBottom:2};
  var alerta={background:"#450a0a",border:"1px solid #ef4444",borderRadius:5,padding:"5px 8px",marginBottom:5,fontSize:10,color:"#ef4444",fontWeight:700};

  return (
    <div style={{background:"#080c10",minHeight:"100vh"}}>
    <div style={{maxWidth:600,margin:"0 auto",padding:"8px 12px 50px"}}>
      <div style={{borderBottom:"1px solid #1e2530",marginBottom:12,paddingBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:"#f0ece6"}}>QC RECIBO</div>
          <div style={{fontSize:8,color:"#4a5568",letterSpacing:2,textTransform:"uppercase"}}>Inspeccion de campo - Parras Valley</div>
        </div>
        <div style={{textAlign:"right",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:7,padding:"4px 10px"}}>
          <div style={{fontSize:18,fontWeight:900,color:"#22c55e"}}>{muestras.length}</div>
          <div style={{fontSize:8,color:"#4a5568"}}>muestras</div>
        </div>
      </div>

      <div style={{display:"flex",gap:3,marginBottom:14}}>
        {[["captura","Captura"],["dia","Dia"],["historial","Historial"]].map(function(x){
          return <button key={x[0]} onClick={function(){setTab(x[0]);}} style={{flex:1,padding:"8px 4px",border:"none",background:"transparent",fontFamily:"monospace",fontSize:11,fontWeight:700,cursor:"pointer",color:tab===x[0]?"#22c55e":"#4a5568",textTransform:"uppercase",borderBottom:tab===x[0]?"2px solid #22c55e":"2px solid transparent"}}>{x[1]}</button>;
        })}
      </div>

      {tab==="captura"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
            <div><div style={lbl}>Rancho</div>
              <select style={inp} value={form.rancho} onChange={function(e){set("rancho",e.target.value);}}>
                {RANCHOS.map(function(r){return <option key={r}>{r}</option>;})}
              </select>
            </div>
            <div><div style={lbl}>Malla</div>
              <input style={inp} placeholder="Ej: 5" value={form.malla} onChange={function(e){set("malla",e.target.value);}}/>
            </div>
            <div><div style={lbl}>Piezas prom.</div>
              <input style={inp} type="number" placeholder="0" value={form.piezas} onChange={function(e){set("piezas",e.target.value);}}/>
            </div>
          </div>

          <div style={{marginBottom:8}}>
            <div style={lbl}>Producto</div>
            <select style={{...inp,fontSize:14}} value={form.producto} onChange={function(e){cambioProd(e.target.value);}}>
              {PRODUCTOS.map(function(p){return <option key={p}>{p}</option>;})}
            </select>
          </div>

          <div style={{marginBottom:8}}>
            <div style={lbl}>Peso prom. (kg)</div>
            <input style={inp} type="number" placeholder="0.0" value={form.peso} onChange={function(e){set("peso",e.target.value);}}/>
          </div>

          {total>0&&pPri<70&&<div style={alerta}>ALERTA - Primera {pPri}% por debajo del 70%</div>}
          {total>0&&pPri>=70&&pPri<80&&<div style={{...alerta,background:"#451a03",borderColor:"#f59e0b",color:"#f59e0b"}}>CUIDADO - Primera {pPri}% en nivel medio</div>}
          {total>0&&pMer>10&&<div style={alerta}>ALERTA - Merma {pMer}% supera el 10%</div>}
          {alertaCuadre&&<div style={alerta}>INCONGRUENCIA - Calidades ({total}) no cuadran con piezas ({totalPiezas})</div>}
          {alertaInc&&<div style={alerta}>INCONGRUENCIA - Defectos ({totalDefs}) superan piezas con defecto ({piezasDefecto})</div>}

          {total>0&&(
            <div style={{background:smNow.c+"22",border:"1px solid "+smNow.c+"44",borderRadius:7,padding:"8px 10px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:32,fontWeight:900,color:smNow.c,fontFamily:"Georgia,serif"}}>{pPri}%</div>
              <div style={{flex:1,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>
                {[["1ra",pPri,"#22c55e"],["2da",pSeg,"#f59e0b"],["3ra",pTer,"#f97316"],["Merma",pMer,"#ef4444"]].map(function(x){
                  return <div key={x[0]} style={{textAlign:"center",background:"rgba(0,0,0,0.3)",borderRadius:4,padding:3}}>
                    <div style={{fontSize:8,color:"#4a5568"}}>{x[0]}</div>
                    <div style={{fontSize:13,fontWeight:900,color:x[2],fontFamily:"Georgia,serif"}}>{x[1]}%</div>
                  </div>;
                })}
              </div>
              <div style={{color:smNow.c,border:"1px solid "+smNow.c,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700}}>{smNow.lbl}</div>
            </div>
          )}

          <div style={lbl}>Calidades (piezas)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4,marginBottom:6,marginTop:4}}>
            {[["primera","1ra","#22c55e"],["segunda","2da","#f59e0b"],["tercera","3ra","#f97316"],["merma","Merma","#ef4444"]].map(function(x){
              return <div key={x[0]} style={{background:"#0d1117",border:"1px solid "+(nv(form[x[0]])>0?x[2]+"44":"#1e2530"),borderRadius:5,padding:"5px 4px",textAlign:"center"}}>
                <div style={{fontSize:8,color:x[2],textTransform:"uppercase",marginBottom:2}}>{x[1]}</div>
                <input style={{width:"100%",border:"none",borderBottom:"1px solid "+(nv(form[x[0]])>0?x[2]:"rgba(255,255,255,0.1)"),background:"transparent",color:"#f0ece6",fontFamily:"Georgia,serif",fontSize:16,fontWeight:900,textAlign:"center",outline:"none"}} type="number" min="0" placeholder="0" value={form[x[0]]} onChange={function(e){set(x[0],e.target.value);}}/>
                <div style={{fontSize:13,fontWeight:900,color:nv(form[x[0]])>0?x[2]:"rgba(255,255,255,0.1)",fontFamily:"Georgia,serif",marginTop:2}}>{total>0?pct(nv(form[x[0]]),total):0}%</div>
              </div>;
            })}
          </div>
          <div style={{textAlign:"center",fontSize:10,color:"#4a5568",marginBottom:6}}>Total: <b style={{color:"#f0ece6"}}>{total}</b> piezas</div>

          <div style={{...lbl,marginBottom:4}}>Defectos (piezas)</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,marginBottom:8}}>
            {(DEFECTOS[form.producto]||[]).map(function(d){
              var cant=nv(form.defs[d]||0);
              var p=pct(cant,total);
              return <div key={d} style={{display:"flex",alignItems:"center",gap:5,background:cant>0?"rgba(34,197,94,0.08)":"rgba(0,0,0,0.2)",border:"1px solid "+(cant>0?"rgba(34,197,94,0.3)":"rgba(255,255,255,0.06)"),borderRadius:5,padding:"4px 6px"}}>
                <span style={{fontSize:10,flex:1,color:cant>0?"#d1fae5":"#6b7280"}}>{d}</span>
                <input style={{width:36,border:"none",borderBottom:"1px solid rgba(255,255,255,0.2)",background:"transparent",color:"#f0ece6",fontFamily:"monospace",fontSize:12,fontWeight:700,textAlign:"center",outline:"none"}} type="number" min="0" placeholder="0" value={form.defs[d]||""} onChange={function(e){setD(d,e.target.value);}}/>
                <span style={{fontSize:10,fontWeight:700,color:cant>0?"#22c55e":"rgba(255,255,255,0.15)",minWidth:26,textAlign:"right"}}>{p}%</span>
              </div>;
            })}
          </div>

          <button onClick={guardar} style={{...btn,background:puedoGuardar?"linear-gradient(135deg,#16a34a,#22c55e)":"rgba(255,255,255,0.05)",color:puedoGuardar?"#052e16":"#4a5568"}}>
            {alertaInc||alertaCuadre?"Corrige la incongruencia":"Guardar muestra"}
          </button>
          <button onClick={function(){setForm(initForm(form.producto));}} style={{...btn,background:"transparent",border:"1px solid #1e2530",color:"#4a5568"}}>
            Limpiar
          </button>
        </div>
      )}

      {tab==="dia"&&(
        <div>
          {muestras.length===0
            ? <div style={{textAlign:"center",color:"#1e2530",padding:32,fontSize:12}}>Sin muestras hoy</div>
            : <div>
              {calcRes().map(function(g,i){
                var sm2=sem(g.avgPri);
                return <div key={i} style={{background:"#0d1117",border:"1px solid "+sm2.c+"33",borderRadius:8,marginBottom:10,overflow:"hidden"}}>
                  <div style={{background:"#0a0f14",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1e2530"}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:sm2.c}}>{g.rancho} - {g.producto}</div>
                      <div style={{fontSize:9,color:"#4a5568"}}>{g.n} muestra{g.n>1?"s":""}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:28,fontWeight:900,color:sm2.c,fontFamily:"Georgia,serif"}}>{f1(g.avgPri)}%</div>
                      <div style={{fontSize:9,color:sm2.c,fontWeight:700}}>{sm2.lbl}</div>
                    </div>
                  </div>
                  {g.avgPri<70&&<div style={{background:"#450a0a",padding:"4px 12px",color:"#ef4444",fontWeight:700,fontSize:10}}>ALERTA - Primera por debajo del 70%</div>}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 12px",borderBottom:"1px solid #0a0f14"}}>
                    <span style={{color:"#4a5568"}}>Peso promedio</span><span style={{fontWeight:700}}>{f1(g.avgPeso)} kg</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 12px",borderBottom:"1px solid #0a0f14"}}>
                    <span style={{color:"#4a5568"}}>Merma promedio</span><span style={{fontWeight:700,color:g.avgMer>10?"#ef4444":"#f0ece6"}}>{f1(g.avgMer)}%{g.avgMer>10?" ALERTA":""}</span>
                  </div>
                  {g.topDefs.length>0&&<div style={{padding:"8px 12px"}}>
                    <div style={{fontSize:8,color:"#4a5568",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Podium de defectos</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                      {g.topDefs.map(function(d,j){
                        var cols=["#f59e0b","#94a3b8","#cd7c3a"];
                        return <div key={j} style={{background:"rgba(0,0,0,0.3)",border:"1px solid "+cols[j]+"44",borderRadius:6,padding:"7px 5px",textAlign:"center"}}>
                          <div style={{fontSize:14,fontWeight:900,color:cols[j],marginBottom:2}}>{j+1}</div>
                          <div style={{fontSize:10,color:"#f0ece6",fontWeight:600,marginBottom:2}}>{d.d}</div>
                          <div style={{fontSize:18,fontWeight:900,color:cols[j],fontFamily:"Georgia,serif"}}>{f1(d.p)}%</div>
                        </div>;
                      })}
                    </div>
                  </div>}
                </div>;
              })}
              <button onClick={function(){
                var res=calcRes();
                saveHist([{fecha:new Date().toLocaleDateString("es-MX"),cnt:muestras.length,muestras:muestras.slice(),resumen:res}].concat(hist).slice(0,60));
                saveMuestras([]);
                setTab("historial");
              }} style={{...btn,background:"#1e2530",color:"#f0ece6",border:"none"}}>
                Cerrar dia y guardar historial
              </button>
            </div>
          }
        </div>
      )}

      {tab==="historial"&&(
        <div>
          {hist.length===0
            ? <div style={{textAlign:"center",color:"#1e2530",padding:32,fontSize:12}}>El historial aparece al cerrar el dia</div>
            : <div>
              {hist.map(function(h,i){
                return <div key={i} style={{background:"#0d1117",border:"1px solid #1e2530",borderRadius:7,marginBottom:8,padding:"8px 12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#f0ece6"}}>{h.fecha}</div>
                    <div style={{fontSize:10,color:"#4a5568"}}>{h.cnt} muestras</div>
                  </div>
                  {(h.resumen||[]).map(function(g,j){
                    var sm3=sem(g.avgPri);
                    return <div key={j} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",borderBottom:"1px solid #0a0f14",color:"#a0aec0"}}>
                      <span style={{color:"#f0ece6",fontWeight:700}}>{g.rancho} - {g.producto}</span>
                      <span style={{color:sm3.c,fontWeight:700}}>{f1(g.avgPri)}% {sm3.lbl}</span>
                    </div>;
                  })}
                </div>;
              })}
              <button onClick={function(){saveHist([]);}} style={{...btn,background:"transparent",border:"1px solid #1e2530",color:"#4a5568"}}>Borrar historial</button>
            </div>
          }
        </div>
      )}

    </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
