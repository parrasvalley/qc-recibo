<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QC Recibo - Parras Valley</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#05100a;color:#f0f0e8;font-family:system-ui,sans-serif;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    select option{background:#0a1e0f;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-thumb{background:rgba(34,197,94,0.3);border-radius:4px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;

var PIN="1986";
var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var RANCHOS=["PVT","CRP","Forrajera","Fepo"];
var PRODS=["Persa","Slicer","Europeo","Morron","Minibel"];
var PCFG={
  Persa:{c:"#4ade80",bg:"rgba(74,222,128,0.1)",br:"rgba(74,222,128,0.3)"},
  Slicer:{c:"#38bdf8",bg:"rgba(56,189,248,0.1)",br:"rgba(56,189,248,0.3)"},
  Europeo:{c:"#c084fc",bg:"rgba(192,132,252,0.1)",br:"rgba(192,132,252,0.3)"},
  Morron:{c:"#f87171",bg:"rgba(248,113,113,0.1)",br:"rgba(248,113,113,0.3)"},
  Minibel:{c:"#fb923c",bg:"rgba(251,146,60,0.1)",br:"rgba(251,146,60,0.3)"},
};
var VARI={Morron:["Rojo","Amarillo","Naranja","Verde"],Minibel:["Rojo","Amarillo","Naranja"]};
var DEFS={
  Persa:["Deforme","Cicatriz","Dano mecan.","Trips","Dano corte","Amarillo","Mal cierre","Podrido","Punta floja","Gusano","Fruta pasada","Fruta tierna","Flacido"],
  Slicer:["Deforme","Cicatriz","D.mecanicos","Trips","Dano corte","Flacidez","L.Menor 7","Punt.blandas","Diam.menor","Gusano"],
  Europeo:["Deforme","Cicatriz","Dano mecan.","Trips","Dano corte","Amarillo","Mal cierre","Gusano","D.Menor 1.5","D.Mayor 2","L.Menor 11","L.Mayor 14","Flacido"],
  Morron:["Deforme","Dano mecan.","Dano corte","Blossom","Cicatriz","Trips","Verde","Podrido","Mancha","Mal cierre","Cracking"],
  Minibel:["Deforme","Dano mecan.","Dano corte","Blossom","Cicatriz","Trips","Verde","Podrido","Mancha","Cracking"],
};

function fbG(k){return fetch(FB+"/"+k+".json").then(function(r){return r.json();}).catch(function(){return null;});}
function fbS(k,v){fetch(FB+"/"+k+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(function(){});try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function nv(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function ni(v){var x=parseInt(v);return isNaN(x)?0:x;}
function f1(v){return isNaN(v)||!isFinite(v)?"0.0":Number(v).toFixed(1);}
function pct(n,t){return t>0?Math.round(n/t*100):0;}
function grx(kg,pz){return pz>0?Math.round(kg/pz*1000):0;}
function sem(p){
  if(p<70)return{c:"#f87171",bg:"rgba(248,113,113,0.12)",br:"rgba(248,113,113,0.4)",t:"ALERTA"};
  if(p<80)return{c:"#fbbf24",bg:"rgba(251,191,36,0.12)",br:"rgba(251,191,36,0.4)",t:"CUIDADO"};
  return{c:"#4ade80",bg:"rgba(74,222,128,0.12)",br:"rgba(74,222,128,0.4)",t:"APROBADO"};
}
function initF(prod){
  var esMor=prod==="Morron";
  var d={};(DEFS[prod]||[]).forEach(function(k){d[k]=esMor?{pz:"",kg:""}:{pz:""};});
  return{rancho:"PVT",malla:"",prod:prod||"Persa",vari:"",pesoT:"",pzT:"",
    pri:esMor?{pz:"",kg:""}:{pz:""},seg:{pz:""},ter:esMor?{pz:"",kg:""}:{pz:""},mer:esMor?{pz:"",kg:""}:{pz:""},
    defs:d,tamL:{pz:"",kg:""},tamXL:{pz:"",kg:""},tamJ:{pz:"",kg:""},
    tCh:{pz:"",kg:""},tSm:{pz:"",kg:""},tMe:{pz:"",kg:""}};
}
var COLS=["#fbbf24","#94a3b8","#cd7c3a","#6b7280"];

function ModalPin(props){
  var s1=useState(""); var v=s1[0]; var sv=s1[1];
  var s2=useState(false); var err=s2[0]; var sErr=s2[1];
  function ok(){if(v===PIN){sv("");sErr(false);props.onOk();}else{sErr(true);sv("");}}
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.88)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#0a1a0a",border:"2px solid rgba(74,222,128,0.3)",borderRadius:16,padding:32,maxWidth:320,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:20,fontWeight:900,color:"#f0f0e8",marginBottom:6}}>Acceso de editor</div>
        <div style={{fontSize:13,color:"#4a7a54",marginBottom:22}}>PIN para registrar y modificar</div>
        <input type="number" value={v} onChange={function(e){sv(e.target.value.slice(0,8));sErr(false);}} placeholder="PIN"
          style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(err?"#f87171":"rgba(74,222,128,0.3)"),borderRadius:10,padding:"13px",color:"#4ade80",fontFamily:"Georgia,serif",fontSize:28,textAlign:"center",outline:"none",marginBottom:err?8:16,letterSpacing:6}}/>
        {err&&<div style={{fontSize:13,fontWeight:800,color:"#f87171",marginBottom:12}}>PIN incorrecto</div>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={props.onCancel} style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
          <button onClick={ok} style={{flex:1,padding:"12px",background:"linear-gradient(135deg,#16a34a,#22c55e)",border:"none",borderRadius:9,color:"#052e16",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

function InputCalSimple(props){
  var lbl=props.lbl; var col=props.col; var val=props.val; var on=props.on; var tPz=props.tPz||0;
  var pz=ni(val.pz); var ppz=pct(pz,tPz);
  var INP={width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(pz>0?col+"55":"rgba(255,255,255,0.1)"),borderRadius:8,padding:"8px 6px",color:"#f0f0e8",fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,textAlign:"center",outline:"none"};
  return (
    <div style={{background:"rgba(0,0,0,0.25)",border:"2px solid "+(pz>0?col+"44":"rgba(255,255,255,0.06)"),borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
      <div style={{fontSize:12,fontWeight:900,color:col,marginBottom:10,letterSpacing:1}}>{lbl}</div>
      <input style={INP} type="number" min="0" placeholder="0" value={val.pz||""} onChange={function(e){on({pz:e.target.value});}}/>
      {pz>0&&tPz>0&&<div style={{fontSize:20,fontWeight:900,color:col,marginTop:8}}>{ppz}%</div>}
    </div>
  );
}

function InputCal(props){
  var lbl=props.lbl; var col=props.col; var val=props.val; var on=props.on;
  var tKg=props.tKg||0; var tPz=props.tPz||0;
  var pz=ni(val.pz); var kg=nv(val.kg);
  var ppz=pct(pz,tPz); var pkg=pct(kg,tKg); var gr=grx(kg,pz);
  var INP={width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(pz>0||kg>0?col+"55":"rgba(255,255,255,0.1)"),borderRadius:8,padding:"8px 6px",color:"#f0f0e8",fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,textAlign:"center",outline:"none"};
  return (
    <div style={{background:"rgba(0,0,0,0.25)",border:"2px solid "+(pz>0||kg>0?col+"44":"rgba(255,255,255,0.06)"),borderRadius:12,padding:"12px 10px"}}>
      <div style={{fontSize:12,fontWeight:900,color:col,marginBottom:8,letterSpacing:1}}>{lbl}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
        <div>
          <div style={{fontSize:9,color:"#6b7280",fontWeight:700,marginBottom:3}}>PIEZAS</div>
          <input style={INP} type="number" min="0" placeholder="0" value={val.pz||""} onChange={function(e){on({pz:e.target.value,kg:val.kg});}}/>
        </div>
        <div>
          <div style={{fontSize:9,color:"#6b7280",fontWeight:700,marginBottom:3}}>KG</div>
          <input style={INP} type="number" min="0" step="0.01" placeholder="0.00" value={val.kg||""} onChange={function(e){on({pz:val.pz,kg:e.target.value});}}/>
        </div>
      </div>
      {(pz>0||kg>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
          <div style={{background:"rgba(0,0,0,0.3)",borderRadius:5,padding:"4px",textAlign:"center"}}>
            <div style={{fontSize:8,color:"#6b7280"}}>%pz</div>
            <div style={{fontSize:15,fontWeight:900,color:col}}>{ppz}%</div>
          </div>
          <div style={{background:"rgba(0,0,0,0.3)",borderRadius:5,padding:"4px",textAlign:"center"}}>
            <div style={{fontSize:8,color:"#6b7280"}}>%kg</div>
            <div style={{fontSize:15,fontWeight:900,color:col}}>{pkg}%</div>
          </div>
          <div style={{background:"rgba(0,0,0,0.3)",borderRadius:5,padding:"4px",textAlign:"center"}}>
            <div style={{fontSize:8,color:"#6b7280"}}>g/pz</div>
            <div style={{fontSize:15,fontWeight:900,color:col}}>{gr}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function MiniInput(props){
  var lbl=props.lbl; var col=props.col; var val=props.val; var on=props.on;
  var tKg=props.tKg||0; var tPz=props.tPz||0;
  var pz=ni(val.pz); var kg=nv(val.kg);
  var INP2={width:"100%",background:"rgba(0,0,0,0.4)",border:"1px solid "+(kg>0?col+"44":"rgba(255,255,255,0.08)"),borderRadius:6,padding:"6px 4px",color:"#f0f0e8",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,textAlign:"center",outline:"none"};
  return (
    <div style={{background:"rgba(0,0,0,0.3)",border:"2px solid "+(kg>0?col+"44":"rgba(255,255,255,0.06)"),borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
      <div style={{fontSize:11,fontWeight:900,color:col,marginBottom:8}}>{lbl}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:6}}>
        <div>
          <div style={{fontSize:8,color:"#6b7280",marginBottom:2}}>PZ</div>
          <input style={INP2} type="number" min="0" placeholder="0" value={val.pz||""} onChange={function(e){on({pz:e.target.value,kg:val.kg});}}/>
        </div>
        <div>
          <div style={{fontSize:8,color:"#6b7280",marginBottom:2}}>KG</div>
          <input style={INP2} type="number" min="0" step="0.01" placeholder="0.00" value={val.kg||""} onChange={function(e){on({pz:val.pz,kg:e.target.value});}}/>
        </div>
      </div>
      {(kg>0||pz>0)&&tKg>0&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3}}>
          <div style={{fontSize:11,fontWeight:900,color:col}}>{pct(pz,tPz)}%pz</div>
          <div style={{fontSize:11,fontWeight:900,color:col}}>{pct(kg,tKg)}%kg</div>
          <div style={{fontSize:10,color:col}}>{grx(kg,pz)}g</div>
        </div>
      )}
    </div>
  );
}

function Card(props){
  var m=props.m; var mob=props.mob||false;
  var cfg=PCFG[m.prod]||PCFG.Persa;
  var esMorC=m.prod==="Morron";
  var pPrin=esMorC?(m.pPriKg||0):(m.pPriPz||0);
  var sm2=sem(pPrin);
  return (
    <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid "+sm2.br,borderRadius:12,overflow:"hidden",marginBottom:10}}>
      <div style={{background:sm2.bg,borderBottom:"2px solid "+sm2.br,padding:mob?"12px 14px":"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:mob?14:17,fontWeight:900,color:cfg.c}}>{m.rancho} - {m.prod}{m.vari?" ("+m.vari+")":""}</div>
          <div style={{fontSize:12,fontWeight:700,color:"#4a7a54",marginTop:2}}>Malla {m.malla}{m.pesoT>0?" . "+f1(m.pesoT)+"kg/caja":""}</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:mob?36:48,fontWeight:900,color:sm2.c,fontFamily:"Georgia,serif",lineHeight:1}}>{pPrin}%</div>
          <div style={{fontSize:10,fontWeight:900,color:sm2.c,letterSpacing:2}}>{esMorC?"1RA KG":"1RA"} . {sm2.t}</div>
        </div>
      </div>
      <div style={{padding:mob?"10px 14px":"14px 20px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:10}}>
          {(esMorC
            ? [["PRIMERA",m.pPriKg||0,"#4ade80"],["TERCERA",m.pTerKg||0,"#fb923c"],["MERMA",m.pMerKg||0,"#f87171"]]
            : [["PRIMERA",m.pPriPz||0,"#4ade80"],["SEGUNDA",m.pSegPz||0,"#fbbf24"],["TERCERA",m.pTerPz||0,"#fb923c"],["MERMA",m.pMerPz||0,"#f87171"]]
          ).map(function(x){
            return (
              <div key={x[0]} style={{background:"rgba(0,0,0,0.3)",border:"1px solid "+x[2]+"33",borderRadius:9,padding:"9px 6px",textAlign:"center"}}>
                <div style={{fontSize:10,fontWeight:800,color:x[2],marginBottom:4}}>{x[0]}</div>
                <div style={{fontSize:mob?20:26,fontWeight:900,color:x[2],fontFamily:"Georgia,serif"}}>{x[1]}%</div>
              </div>
            );
          })}
        </div>
        {esMorC&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div style={{background:"rgba(0,0,0,0.25)",border:"1px solid rgba(74,222,128,0.15)",borderRadius:9,padding:"10px"}}>
              <div style={{fontSize:10,fontWeight:800,color:"#86efac",marginBottom:8}}>TAMANOS PRIMERA</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                {[["L",m.tamL,"#4ade80"],["XL",m.tamXL,"#34d399"],["J",m.tamJ,"#6ee7b7"]].map(function(x){
                  var kg2=nv(x[1]&&x[1].kg||0); var pz2=ni(x[1]&&x[1].pz||0);
                  if(!kg2&&!pz2)return null;
                  return (
                    <div key={x[0]} style={{textAlign:"center",background:"rgba(74,222,128,0.06)",borderRadius:7,padding:"7px 3px"}}>
                      <div style={{fontSize:11,fontWeight:800,color:x[2]}}>{x[0]}</div>
                      <div style={{fontSize:15,fontWeight:900,color:x[2]}}>{pct(kg2,nv(m.pesoT||0))}%</div>
                      <div style={{fontSize:9,color:"#86efac"}}>{pz2}pz {f1(kg2)}kg</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{background:"rgba(0,0,0,0.25)",border:"1px solid rgba(251,146,60,0.15)",borderRadius:9,padding:"10px"}}>
              <div style={{fontSize:10,fontWeight:800,color:"#fdba74",marginBottom:8}}>DESGLOSE 3RA</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                {[["Cho",m.tCh,"#fb923c"],["Sml",m.tSm,"#fdba74"],["Med",m.tMe,"#fcd34d"]].map(function(x){
                  var kg2=nv(x[1]&&x[1].kg||0); var pz2=ni(x[1]&&x[1].pz||0);
                  if(!kg2&&!pz2)return null;
                  return (
                    <div key={x[0]} style={{textAlign:"center",background:"rgba(251,146,60,0.06)",borderRadius:7,padding:"7px 3px"}}>
                      <div style={{fontSize:11,fontWeight:800,color:x[2]}}>{x[0]}</div>
                      <div style={{fontSize:15,fontWeight:900,color:x[2]}}>{pct(kg2,nv(m.pesoT||0))}%</div>
                      <div style={{fontSize:9,color:x[2]}}>{pz2}pz {f1(kg2)}kg</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
        {(m.topDefs||[]).length>0&&(
          <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:10}}>
            <div style={{fontSize:10,fontWeight:800,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Top defectos</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {m.topDefs.slice(0,4).map(function(d,j){
                return (
                  <div key={j} style={{background:"rgba(0,0,0,0.3)",border:"1px solid "+COLS[j]+"33",borderRadius:8,padding:"8px 4px",textAlign:"center"}}>
                    <div style={{fontSize:9,fontWeight:800,color:COLS[j]}}>{["#1","#2","#3","#4"][j]}</div>
                    <div style={{fontSize:11,fontWeight:700,color:"#f0f0e8",marginTop:2}}>{d.d}</div>
                    <div style={{fontSize:18,fontWeight:900,color:COLS[j]}}>{esMorC?d.pKg:d.pPz}%</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {props.onEdit&&(
          <div style={{marginTop:10,textAlign:"right"}}>
            <button onClick={function(){props.onEdit(m);}}
              style={{padding:"6px 16px",background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:7,color:"#38bdf8",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>
              Editar muestra
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  var s1=useState("cap"); var tab=s1[0]; var setTab=s1[1];
  var s2=useState(function(){return initF("Persa");}); var form=s2[0]; var setForm=s2[1];
  var s3=useState([]); var muestras=s3[0]; var setMuestras=s3[1];
  var s4=useState([]); var hist=s4[0]; var setHist=s4[1];
  var s5=useState({}); var acum=s5[0]; var setAcum=s5[1];
  var s6=useState(null); var openH=s6[0]; var setOpenH=s6[1];
  var s7=useState(false); var auth=s7[0]; var setAuth=s7[1];
  var s8=useState(false); var showPin=s8[0]; var setShowPin=s8[1];
  var s9=useState(null); var pinCb=s9[0]; var setPinCb=s9[1];
  var s10=useState(false); var mob=s10[0]; var setMob=s10[1];
  var s11=useState(""); var fR=s11[0]; var setFR=s11[1];
  var s12=useState(""); var fP=s12[0]; var setFP=s12[1];
  var s13=useState(""); var fM=s13[0]; var setFM=s13[1];
  var s14=useState({}); var gAb=s14[0]; var setGAb=s14[1];
  var s15=useState(null); var editM=s15[0]; var setEditM=s15[1];

  useEffect(function(){
    function resize(){setMob(window.innerWidth<768);}
    resize();
    window.addEventListener("resize",resize);
    return function(){window.removeEventListener("resize",resize);};
  },[]);

  useEffect(function(){
    function load(){
      fbG("qcr2-v1").then(function(d){if(d&&Array.isArray(d))setMuestras(d);});
      fbG("qcr2-h-v1").then(function(d){if(d&&Array.isArray(d))setHist(d);});
      fbG("qcr2-acum-v1").then(function(d){if(d&&typeof d==="object"&&!Array.isArray(d))setAcum(d);});
    }
    load();
    var t=setInterval(load,30000);
    return function(){clearInterval(t);};
  },[]);

  function savM(v){setMuestras(v);fbS("qcr2-v1",v);}
  function savH(v){setHist(v);fbS("qcr2-h-v1",v);}
  function savA(v){setAcum(v);fbS("qcr2-acum-v1",v);}

  function setF(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});}
  function setD(k,v){setForm(function(f){var nd=Object.assign({},f.defs);nd[k]=v;var n=Object.assign({},f);n.defs=nd;return n;});}
  function cambProd(p){setForm(initF(p));}

  function pinReq(cb){
    if(auth){cb();return;}
    setPinCb(function(){return cb;});
    setShowPin(true);
  }
  function pinOk(){
    setAuth(true);setShowPin(false);
    if(pinCb){pinCb();setPinCb(null);}
  }

  var esMor=form.prod==="Morron";
  var priPz=ni(form.pri.pz); var priKg=esMor?nv(form.pri.kg):0;
  var segPz=ni(form.seg.pz);
  var terPz=ni(form.ter.pz); var terKg=esMor?nv(form.ter.kg):0;
  var merPz=ni(form.mer.pz); var merKg=esMor?nv(form.mer.kg):0;
  var sumPz=priPz+segPz+terPz+merPz;
  var sumKg=priKg+terKg+merKg;

                <label style={{fontSize:11,color:"#86efac",fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,marginBottom:5,display:"block"}}>Peso caja (kg)</label>
                <input type="number" step="0.01"
                  style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(74,222,128,0.3)",borderRadius:8,padding:"10px",color:"#4ade80",fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,textAlign:"center",outline:"none"}}
                  value={editM.pesoT||""} onChange={function(e){setEditM(function(p){return Object.assign({},p,{pesoT:nv(e.target.value)});});}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"#86efac",fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,marginBottom:5,display:"block"}}>Piezas totales</label>
                <input type="number"
                  style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:8,padding:"10px",color:"#fbbf24",fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,textAlign:"center",outline:"none"}}
                  value={editM.totalPz||""} onChange={function(e){setEditM(function(p){return Object.assign({},p,{totalPz:ni(e.target.value)});});}}/>
              </div>
            </div>

            {editM.prod!=="Morron"&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:800,color:"#86efac",marginBottom:10}}>Calidades (piezas)</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                  {[["1ra","priPz","#4ade80"],["2da","segPz","#fbbf24"],["3ra","terPz","#fb923c"],["Merma","merPz","#f87171"]].map(function(x){
                    return (
                      <div key={x[0]} style={{textAlign:"center"}}>
                        <div style={{fontSize:10,color:x[2],fontWeight:700,marginBottom:4}}>{x[0].toUpperCase()}</div>
                        <input type="number"
                          style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+x[2]+"44",borderRadius:7,padding:"8px 4px",color:x[2],fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,textAlign:"center",outline:"none"}}
                          value={editM[x[1]]||""} onChange={function(e){var k=x[1];setEditM(function(p){var n=Object.assign({},p);n[k]=ni(e.target.value);return n;});}}/>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {editM.prod==="Morron"&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:800,color:"#86efac",marginBottom:10}}>Calidades (kg)</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {[["1ra kg","priKg","#4ade80"],["3ra kg","terKg","#fb923c"],["Merma kg","merKg","#f87171"]].map(function(x){
                    return (
                      <div key={x[0]} style={{textAlign:"center"}}>
                        <div style={{fontSize:10,color:x[2],fontWeight:700,marginBottom:4}}>{x[0].toUpperCase()}</div>
                        <input type="number" step="0.01"
                          style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+x[2]+"44",borderRadius:7,padding:"8px 4px",color:x[2],fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,textAlign:"center",outline:"none"}}
                          value={editM[x[1]]||""} onChange={function(e){var k=x[1];setEditM(function(p){var n=Object.assign({},p);n[k]=nv(e.target.value);return n;});}}/>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button onClick={function(){setEditM(null);}}
                style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>
                Cancelar
              </button>
              <button onClick={function(){
                // Recalcular porcentajes
                var m=Object.assign({},editM);
                var tPz=m.totalPz||1; var tKg=m.pesoT||1;
                if(m.prod!=="Morron"){
                  m.pPriPz=pct(m.priPz||0,tPz); m.pSegPz=pct(m.segPz||0,tPz);
                  m.pTerPz=pct(m.terPz||0,tPz); m.pMerPz=pct(m.merPz||0,tPz);
                  m.pPri=m.pPriPz; m.pSeg=m.pSegPz; m.pTer=m.pTerPz; m.pMer=m.pMerPz;
                } else {
                  m.pPriKg=pct(m.priKg||0,tKg); m.pTerKg=pct(m.terKg||0,tKg); m.pMerKg=pct(m.merKg||0,tKg);
                  m.pPri=m.pPriKg; m.pTer=m.pTerKg; m.pMer=m.pMerKg;
                }
                guardarEdicion(m);
              }}
                style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#0369a1,#38bdf8)",border:"none",borderRadius:9,color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>
                Guardar cambios
              </button>
            </div>
          </div>
        </div>
      )}

      {showPin&&<ModalPin onOk={function(){pinOk();}} onCancel={function(){setShowPin(false);setPinCb(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
